<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 0;">
<canvas id="pfp" width="400" height="400" style="border-radius:50%;display:block;"></canvas>
<button onclick="dl()" style="background:#b8963a;color:#0a0806;border:none;padding:9px 24px;font-family:Georgia,serif;font-size:13px;letter-spacing:2px;cursor:pointer;border-radius:2px;">SAVE PFP</button>
</div>
<script>
const C = document.getElementById('pfp');
const ctx = C.getContext('2d');
const W=400,H=400,cx=200,cy=200;
const phi=1.6180339887;
const b=Math.log(phi)/(Math.PI/2);
const R0=170;

function draw(){
  ctx.fillStyle='#0c0906';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx,cy,192,0,Math.PI*2);
  ctx.clip();

  // diagonal hatching
  ctx.strokeStyle='rgba(160,120,40,0.065)';
  ctx.lineWidth=0.5;
  for(let i=-400;i<800;i+=7){
    ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+400,400);ctx.stroke();
  }
  ctx.strokeStyle='rgba(160,120,40,0.035)';
  for(let i=-400;i<800;i+=18){
    ctx.beginPath();ctx.moveTo(i,400);ctx.lineTo(i+400,0);ctx.stroke();
  }

  // faint phi-rectangle overlays
  ctx.strokeStyle='rgba(200,165,55,0.055)';
  ctx.lineWidth=0.6;
  let s=R0*0.618;
  for(let i=0;i<8;i++){
    ctx.strokeRect(cx-s/2,cy-s/2,s,s);
    s*=0.618;
  }

  // spiral layers (woodcut texture via offsets)
  function sp(off,lw,a){
    ctx.beginPath();
    let first=true;
    for(let t=0;t<=24;t+=0.012){
      const r=R0*Math.exp(-b*t);
      if(r<0.6)break;
      const x=cx+r*Math.cos(t+off);
      const y=cy+r*Math.sin(t+off);
      first?(ctx.moveTo(x,y),first=false):ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(215,178,78,${a})`;
    ctx.lineWidth=lw;
    ctx.lineJoin='round';
    ctx.lineCap='round';
    ctx.stroke();
  }

  sp(0,2.8,0.88);
  sp(0.016,1.3,0.42);
  sp(-0.016,1.3,0.42);
  sp(0.033,0.7,0.18);
  sp(-0.033,0.7,0.18);

  // center crosshair — the unreachable
  ctx.strokeStyle='rgba(215,178,78,0.45)';
  ctx.lineWidth=0.7;
  ctx.beginPath();ctx.moveTo(cx-8,cy);ctx.lineTo(cx+8,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-8);ctx.lineTo(cx,cy+8);ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx,cy,2.2,0,Math.PI*2);
  ctx.fillStyle='rgba(215,178,78,0.45)';
  ctx.fill();

  ctx.restore();

  // phi glyph
  ctx.save();
  ctx.font='italic 122px Georgia,"Times New Roman",serif';
  ctx.fillStyle='rgba(225,192,88,0.84)';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('φ',cx+18,cy-6);
  ctx.restore();

  // subtitle
  ctx.save();
  ctx.font='10px Georgia,serif';
  ctx.fillStyle='rgba(180,148,58,0.48)';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('· · · φ · · ·',cx,cy+76);
  ctx.restore();

  // double ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx,cy,188,0,Math.PI*2);
  ctx.strokeStyle='rgba(190,152,58,0.78)';
  ctx.lineWidth=1.4;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx,cy,195,0,Math.PI*2);
  ctx.strokeStyle='rgba(190,152,58,0.28)';
  ctx.lineWidth=0.7;
  ctx.stroke();

  // tick marks
  for(let a=0;a<Math.PI*2;a+=Math.PI/4){
    const card=a%(Math.PI/2)<0.01;
    const r1=188,r2=card?200:194;
    ctx.beginPath();
    ctx.moveTo(cx+r1*Math.cos(a),cy+r1*Math.sin(a));
    ctx.lineTo(cx+r2*Math.cos(a),cy+r2*Math.sin(a));
    ctx.strokeStyle=card?'rgba(190,152,58,0.85)':'rgba(190,152,58,0.5)';
    ctx.lineWidth=card?1.3:0.7;
    ctx.stroke();
  }
  ctx.restore();
}

draw();

function dl(){
  const a=document.createElement('a');
  a.download='near-phi.png';
  a.href=C.toDataURL('image/png');
  a.click();
}
</script>
