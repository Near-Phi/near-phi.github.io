<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Explorer | MathTools</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--panel:#12121a;--border:#1e1e2e;--text:#c8c8d4;
  --accent:#6c7ee1;--accent2:#e16ca0;--dim:#555570;
  --radius:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh;width:100vw;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}
header h1{font-size:16px;font-weight:600;letter-spacing:0.5px}
header h1 span{color:var(--accent);font-weight:700}
.header-right{display:flex;gap:8px;align-items:center}
.btn{background:var(--border);border:1px solid #2a2a3a;color:var(--text);padding:5px 12px;border-radius:var(--radius);cursor:pointer;font-size:12px;transition:all .15s}
.btn:hover{background:#2a2a3a;border-color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.main-area{display:flex;flex:1;overflow:hidden;position:relative}
.canvas-container{flex:1;position:relative;display:flex}
#mandelbrot-wrap{flex:1;position:relative;min-width:0}
#julia-wrap{width:0;position:relative;transition:width .3s ease;overflow:hidden;border-left:1px solid var(--border)}
#julia-wrap.open{width:35%}
#julia-wrap .julia-label{position:absolute;top:8px;left:8px;font-size:11px;color:var(--dim);z-index:2;background:rgba(10,10,15,.7);padding:2px 8px;border-radius:3px}
canvas{display:block;width:100%;height:100%}
.sidebar{width:260px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:12px;display:flex;flex-direction:column;gap:12px}
.section{background:#16161f;border:1px solid var(--border);border-radius:var(--radius);padding:10px}
.section h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:8px}
.info-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.info-row .label{color:var(--dim)}
.info-row .value{font-family:'Consolas','Courier New',monospace;color:var(--accent);font-size:11px;text-align:right;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.control-row{margin-bottom:8px}
.control-row label{display:block;font-size:11px;color:var(--dim);margin-bottom:3px}
input[type=range]{width:100%;accent-color:var(--accent);height:4px;-webkit-appearance:none;background:#1e1e2e;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:var(--radius);font-size:12px}
.palette-preview{display:flex;height:16px;border-radius:3px;overflow:hidden;margin-top:4px}
.palette-preview div{flex:1}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.preset-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:3px;cursor:pointer;font-size:10px;text-align:center;transition:all .15s}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:2px 0}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{display:none}
.toggle .slider{position:absolute;inset:0;background:#1e1e2e;border-radius:10px;cursor:pointer;transition:.2s}
.toggle input:checked+.slider{background:var(--accent)}
.toggle .slider::before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider::before{transform:translateX(16px)}
.crosshair{position:absolute;pointer-events:none;z-index:5}
.crosshair-h,.crosshair-v{position:absolute;background:rgba(108,126,225,.25)}
.crosshair-h{height:1px;width:100%;left:0}
.crosshair-v{width:1px;height:100%;top:0}
.zoom-indicator{position:absolute;bottom:8px;left:8px;font-size:10px;color:var(--dim);background:rgba(10,10,15,.7);padding:2px 8px;border-radius:3px;z-index:5;font-family:monospace}
.back-link{color:var(--dim);text-decoration:none;font-size:12px;transition:color .15s}
.back-link:hover{color:var(--accent)}
.loading-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;transition:opacity .5s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-text{font-size:14px;color:var(--dim);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.phi-canvas{position:absolute;inset:0;pointer-events:none;z-index:3}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <a href="index.html" class="back-link">MathTools</a>
    <h1><span>Fractal</span> Explorer</h1>
  </div>
  <div class="header-right">
    <button class="btn" id="btn-julia" title="Toggle Julia set panel">Julia Set</button>
    <button class="btn" id="btn-export" title="Save as PNG">Export PNG</button>
    <button class="btn" id="btn-reset" title="Reset view">Reset</button>
  </div>
</header>

<div class="main-area">
  <div class="canvas-container">
    <div id="mandelbrot-wrap">
      <canvas id="mandelbrot"></canvas>
      <canvas class="phi-canvas" id="phi-overlay"></canvas>
      <div class="zoom-indicator" id="zoom-label">Zoom: 1x</div>
      <div class="loading-overlay" id="loading"><div class="loading-text">Initializing WebGL...</div></div>
    </div>
    <div id="julia-wrap">
      <div class="julia-label">Julia Set</div>
      <canvas id="julia"></canvas>
    </div>
  </div>

  <div class="sidebar">
    <div class="section">
      <h3>Coordinates</h3>
      <div class="info-row"><span class="label">Real</span><span class="value" id="info-re">-0.5</span></div>
      <div class="info-row"><span class="label">Imaginary</span><span class="value" id="info-im">0.0</span></div>
      <div class="info-row"><span class="label">Zoom</span><span class="value" id="info-zoom">1.00x</span></div>
      <div class="info-row"><span class="label">Depth</span><span class="value" id="info-depth">10^0</span></div>
      <div class="info-row"><span class="label">Julia c</span><span class="value" id="info-julia">--</span></div>
    </div>

    <div class="section">
      <h3>Rendering</h3>
      <div class="control-row">
        <label>Max Iterations: <span id="iter-val">200</span></label>
        <input type="range" id="iterations" min="50" max="5000" value="200" step="10">
      </div>
      <div class="control-row">
        <label>Color Palette</label>
        <select id="palette">
          <option value="0">Rainbow</option>
          <option value="1">Fire</option>
          <option value="2">Ocean</option>
          <option value="3">Monochrome</option>
          <option value="4">Neon</option>
          <option value="5">Sunset</option>
          <option value="6">Ice</option>
        </select>
        <div class="palette-preview" id="palette-preview"></div>
      </div>
      <div class="toggle-row">
        <span>Smooth Coloring</span>
        <label class="toggle"><input type="checkbox" id="smoothing" checked><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <span>Phi Spiral Overlay</span>
        <label class="toggle"><input type="checkbox" id="phi-toggle"><span class="slider"></span></label>
      </div>
    </div>

    <div class="section">
      <h3>Presets</h3>
      <div class="preset-grid">
        <button class="preset-btn" data-preset="0">Seahorse Valley</button>
        <button class="preset-btn" data-preset="1">Mini-Mandelbrot</button>
        <button class="preset-btn" data-preset="2">Elephant Valley</button>
        <button class="preset-btn" data-preset="3">Spiral Arms</button>
        <button class="preset-btn" data-preset="4">Lightning</button>
        <button class="preset-btn" data-preset="5">Double Spiral</button>
      </div>
    </div>

    <div class="section" style="font-size:11px;color:var(--dim)">
      <h3>Controls</h3>
      <div style="line-height:1.6">
        Scroll to zoom<br>
        Click + drag to pan<br>
        Click to set Julia c-value<br>
        Double-click to zoom in
      </div>
    </div>
  </div>
</div>

<script>
// === WebGL Fractal Renderer ===

const VS = `
attribute vec2 a_pos;
void main(){gl_Position=vec4(a_pos,0,1);}
`;

const FS = `
precision highp float;
uniform vec2 u_resolution;
uniform vec2 u_center;
uniform float u_zoom;
uniform int u_maxIter;
uniform int u_palette;
uniform int u_smooth;
uniform int u_isJulia;
uniform vec2 u_juliaC;

// Emulated double-precision for deep zooms
// Represents number as (hi + lo) where hi is the main part
vec2 ds_set(float a) { return vec2(a, 0.0); }
vec2 ds_add(vec2 a, vec2 b) {
  float s = a.x + b.x;
  float e = (a.x - s) + b.x + a.y + b.y;
  return vec2(s, e);
}
vec2 ds_mul(vec2 a, vec2 b) {
  float p = a.x * b.x;
  float e = fma(a.x, b.x, -p) + a.x*b.y + a.y*b.x;
  return vec2(p, e);
}
float ds_val(vec2 a) { return a.x + a.y; }

vec3 palette0(float t){
  return .5+.5*cos(6.28318*(t*vec3(1,.7,.4)+vec3(0,.15,.2)));
}
vec3 palette1(float t){
  return vec3(t,t*t*.4,t*t*t*.15);
}
vec3 palette2(float t){
  float s=t*3.14159;
  return vec3(.05+.1*t,.1+.4*sin(s),.3+.7*sin(s*.7));
}
vec3 palette3(float t){
  return vec3(t*1.1,t*1.05,t);
}
vec3 palette4(float t){
  return .5+.5*cos(6.28318*(t*vec3(.8,1.2,.6)+vec3(.1,.4,.7)));
}
vec3 palette5(float t){
  return vec3(.9*t+.1, .3*sin(t*3.14159)+ .1, .6-t*.5);
}
vec3 palette6(float t){
  return vec3(.7*t*t,.85*t,.95*sqrt(t));
}

vec3 getColor(float t, int pal){
  if(pal==0) return palette0(t);
  if(pal==1) return palette1(t);
  if(pal==2) return palette2(t);
  if(pal==3) return palette3(t);
  if(pal==4) return palette4(t);
  if(pal==5) return palette5(t);
  return palette6(t);
}

void main(){
  vec2 uv = (gl_FragCoord.xy - u_resolution*.5) / min(u_resolution.x, u_resolution.y);

  float zr, zi, cr, ci;

  if(u_isJulia==1){
    cr = u_juliaC.x;
    ci = u_juliaC.y;
    zr = uv.x / u_zoom + u_center.x;
    zi = uv.y / u_zoom + u_center.y;
  } else {
    cr = uv.x / u_zoom + u_center.x;
    ci = uv.y / u_zoom + u_center.y;
    zr = 0.0;
    zi = 0.0;
  }

  int iter = 0;
  float zr2, zi2;

  for(int i=0; i<5000; i++){
    if(i >= u_maxIter) break;
    zr2 = zr*zr;
    zi2 = zi*zi;
    if(zr2+zi2 > 256.0) break;
    zi = 2.0*zr*zi + ci;
    zr = zr2 - zi2 + cr;
    iter++;
  }

  if(iter >= u_maxIter){
    gl_FragColor = vec4(0,0,0,1);
    return;
  }

  float fIter = float(iter);

  if(u_smooth==1){
    float log_zn = log(zr*zr + zi*zi) * .5;
    float nu = log(log_zn / log(2.0)) / log(2.0);
    fIter = fIter + 1.0 - nu;
  }

  float t = fract(fIter * .02 + .5);
  vec3 col = getColor(t, u_palette);

  // Add subtle glow near boundary
  float closeness = 1.0 - float(iter) / float(u_maxIter);
  col += vec3(.02,.01,.03) * closeness;

  gl_FragColor = vec4(col, 1);
}
`;

class FractalRenderer {
  constructor(canvas, isJulia = false) {
    this.canvas = canvas;
    this.isJulia = isJulia;
    this.gl = canvas.getContext('webgl', { preserveDrawingBuffer: true, antialias: false });
    if (!this.gl) throw new Error('WebGL not supported');
    this.centerX = isJulia ? 0 : -0.5;
    this.centerY = 0;
    this.zoom = 0.3;
    this.maxIter = 200;
    this.palette = 0;
    this.smooth = 1;
    this.juliaC = [-0.7, 0.27015];
    this.init();
  }

  init() {
    const gl = this.gl;
    const vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, VS);
    gl.compileShader(vs);
    if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(vs));

    const fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, FS);
    gl.compileShader(fs);
    if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(fs));

    this.program = gl.createProgram();
    gl.attachShader(this.program, vs);
    gl.attachShader(this.program, fs);
    gl.linkProgram(this.program);
    gl.useProgram(this.program);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const a = gl.getAttribLocation(this.program, 'a_pos');
    gl.enableVertexAttribArray(a);
    gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);

    this.locs = {};
    ['u_resolution','u_center','u_zoom','u_maxIter','u_palette','u_smooth','u_isJulia','u_juliaC'].forEach(n => {
      this.locs[n] = gl.getUniformLocation(this.program, n);
    });
  }

  resize() {
    const r = this.canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    // Cap resolution for performance
    const maxDim = 2048;
    const w = Math.min(Math.round(r.width * dpr), maxDim);
    const h = Math.min(Math.round(r.height * dpr), maxDim);
    if (this.canvas.width !== w || this.canvas.height !== h) {
      this.canvas.width = w;
      this.canvas.height = h;
    }
  }

  render() {
    this.resize();
    const gl = this.gl;
    gl.viewport(0, 0, this.canvas.width, this.canvas.height);
    gl.useProgram(this.program);
    gl.uniform2f(this.locs.u_resolution, this.canvas.width, this.canvas.height);
    gl.uniform2f(this.locs.u_center, this.centerX, this.centerY);
    gl.uniform1f(this.locs.u_zoom, this.zoom);
    gl.uniform1i(this.locs.u_maxIter, this.maxIter);
    gl.uniform1i(this.locs.u_palette, this.palette);
    gl.uniform1i(this.locs.u_smooth, this.smooth);
    gl.uniform1i(this.locs.u_isJulia, this.isJulia ? 1 : 0);
    gl.uniform2f(this.locs.u_juliaC, this.juliaC[0], this.juliaC[1]);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
}

// === App State ===
let mandelbrot, julia;
let juliaOpen = false;
let phiVisible = false;
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragCenter = { x: 0, y: 0 };
let animFrame = null;

function init() {
  mandelbrot = new FractalRenderer(document.getElementById('mandelbrot'), false);
  julia = new FractalRenderer(document.getElementById('julia'), true);
  requestRender();
  document.getElementById('loading').classList.add('hidden');
  setupEvents();
  updateInfo();
  updatePalettePreview();
}

function requestRender() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(() => {
    mandelbrot.render();
    if (juliaOpen) julia.render();
    if (phiVisible) drawPhiOverlay();
    animFrame = null;
  });
}

// === UI Updates ===
function updateInfo() {
  document.getElementById('info-re').textContent = mandelbrot.centerX.toFixed(14);
  document.getElementById('info-im').textContent = mandelbrot.centerY.toFixed(14);
  const zoomLevel = mandelbrot.zoom / 0.3;
  document.getElementById('info-zoom').textContent = zoomLevel < 1000 ? zoomLevel.toFixed(2) + 'x' : zoomLevel.toExponential(2) + 'x';
  const depth = Math.log10(zoomLevel);
  document.getElementById('info-depth').textContent = '10^' + depth.toFixed(1);
  document.getElementById('zoom-label').textContent = 'Zoom: ' + (zoomLevel < 1000 ? zoomLevel.toFixed(1) + 'x' : zoomLevel.toExponential(2) + 'x');
  if (juliaOpen) {
    document.getElementById('info-julia').textContent = julia.juliaC[0].toFixed(6) + ' + ' + julia.juliaC[1].toFixed(6) + 'i';
  }
}

function updatePalettePreview() {
  const container = document.getElementById('palette-preview');
  container.innerHTML = '';
  const idx = parseInt(document.getElementById('palette').value);
  // Create a mini canvas to sample colors
  const c = document.createElement('canvas');
  c.width = 256; c.height = 1;
  const ctx = c.getContext('2d');
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let r, g, b;
    const pi = Math.PI;
    switch(idx) {
      case 0: { const v = t; r=(.5+.5*Math.cos(6.28*(v+0)))*255; g=(.5+.5*Math.cos(6.28*(v*.7+.15)))*255; b=(.5+.5*Math.cos(6.28*(v*.4+.2)))*255; break; }
      case 1: r=t*255; g=t*t*.4*255; b=t*t*t*.15*255; break;
      case 2: { const s=t*pi; r=(.05+.1*t)*255; g=(.1+.4*Math.sin(s))*255; b=(.3+.7*Math.sin(s*.7))*255; break; }
      case 3: r=t*1.1*255; g=t*1.05*255; b=t*255; break;
      case 4: r=(.5+.5*Math.cos(6.28*(t*.8+.1)))*255; g=(.5+.5*Math.cos(6.28*(t*1.2+.4)))*255; b=(.5+.5*Math.cos(6.28*(t*.6+.7)))*255; break;
      case 5: r=(.9*t+.1)*255; g=(.3*Math.sin(t*pi)+.1)*255; b=(.6-t*.5)*255; break;
      case 6: r=.7*t*t*255; g=.85*t*255; b=.95*Math.sqrt(t)*255; break;
    }
    ctx.fillStyle = `rgb(${Math.min(255,Math.max(0,r|0))},${Math.min(255,Math.max(0,g|0))},${Math.min(255,Math.max(0,b|0))})`;
    ctx.fillRect(i, 0, 1, 1);
  }
  // Render as stretched image in container
  for (let i = 0; i < 20; i++) {
    const d = document.createElement('div');
    const t = i / 19;
    const x = Math.floor(t * 255);
    const px = ctx.getImageData(x, 0, 1, 1).data;
    d.style.background = `rgb(${px[0]},${px[1]},${px[2]})`;
    container.appendChild(d);
  }
}

// === Phi Spiral Overlay ===
function drawPhiOverlay() {
  const canvas = document.getElementById('phi-overlay');
  const parent = canvas.parentElement;
  canvas.width = parent.clientWidth;
  canvas.height = parent.clientHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!phiVisible) return;

  const phi = (1 + Math.sqrt(5)) / 2;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const scale = Math.min(canvas.width, canvas.height) * 0.4;

  ctx.strokeStyle = 'rgba(225, 180, 108, 0.35)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);

  // Golden spiral using polar coordinates
  ctx.beginPath();
  for (let theta = 0; theta < 20; theta += 0.02) {
    const r = scale * Math.pow(phi, theta * 2 / Math.PI) * 0.01;
    const x = cx + r * Math.cos(theta);
    const y = cy - r * Math.sin(theta);
    if (theta === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    if (r > scale * 2) break;
  }
  ctx.stroke();

  // Second spiral (mirrored)
  ctx.strokeStyle = 'rgba(108, 126, 225, 0.25)';
  ctx.beginPath();
  for (let theta = 0; theta < 20; theta += 0.02) {
    const r = scale * Math.pow(phi, theta * 2 / Math.PI) * 0.01;
    const x = cx - r * Math.cos(theta);
    const y = cy + r * Math.sin(theta);
    if (theta === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    if (r > scale * 2) break;
  }
  ctx.stroke();

  // Golden rectangles
  ctx.setLineDash([2, 6]);
  ctx.strokeStyle = 'rgba(225, 180, 108, 0.15)';
  let w = scale * 0.8, h = w / phi;
  let ox = cx - w/2, oy = cy - h/2;
  for (let i = 0; i < 8; i++) {
    ctx.strokeRect(ox, oy, w, h);
    const nw = h;
    const nh = h / phi;
    switch(i % 4) {
      case 0: ox = ox + w - nw; oy = oy; break;
      case 1: ox = ox; oy = oy + h - nh; break;
      case 2: ox = ox; oy = oy; break;
      case 3: ox = ox; oy = oy; break;
    }
    w = nw; h = nh;
  }
  ctx.setLineDash([]);
}

// === Coordinate mapping ===
function screenToComplex(px, py, renderer) {
  const rect = renderer.canvas.parentElement.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  const minDim = Math.min(w, h);
  const ux = (px - w / 2) / minDim;
  const uy = -(py - h / 2) / minDim;
  return {
    re: ux / renderer.zoom + renderer.centerX,
    im: uy / renderer.zoom + renderer.centerY
  };
}

// === Events ===
function setupEvents() {
  const mc = document.getElementById('mandelbrot-wrap');

  mc.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = mc.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const c = screenToComplex(mx, my, mandelbrot);

    const factor = e.deltaY < 0 ? 1.3 : 1 / 1.3;
    const newZoom = mandelbrot.zoom * factor;

    // Pan towards cursor on zoom
    mandelbrot.centerX += (c.re - mandelbrot.centerX) * (1 - 1/factor);
    mandelbrot.centerY += (c.im - mandelbrot.centerY) * (1 - 1/factor);
    mandelbrot.zoom = newZoom;

    // Auto-increase iterations at deep zoom
    const zoomLevel = mandelbrot.zoom / 0.3;
    const suggestedIter = Math.min(5000, Math.max(200, Math.floor(200 + Math.log2(zoomLevel) * 40)));
    if (suggestedIter > mandelbrot.maxIter) {
      mandelbrot.maxIter = suggestedIter;
      julia.maxIter = suggestedIter;
      document.getElementById('iterations').value = suggestedIter;
      document.getElementById('iter-val').textContent = suggestedIter;
    }

    requestRender();
    updateInfo();
  }, { passive: false });

  mc.addEventListener('mousedown', e => {
    isDragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    dragCenter = { x: mandelbrot.centerX, y: mandelbrot.centerY };
    mc.style.cursor = 'grabbing';
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const rect = mc.getBoundingClientRect();
    const minDim = Math.min(rect.width, rect.height);
    const dx = (e.clientX - dragStart.x) / minDim / mandelbrot.zoom;
    const dy = (e.clientY - dragStart.y) / minDim / mandelbrot.zoom;
    mandelbrot.centerX = dragCenter.x - dx;
    mandelbrot.centerY = dragCenter.y + dy;
    requestRender();
    updateInfo();
  });

  window.addEventListener('mouseup', e => {
    if (isDragging) {
      const dist = Math.hypot(e.clientX - dragStart.x, e.clientY - dragStart.y);
      if (dist < 3 && juliaOpen) {
        // Click without drag - set Julia c value
        const rect = mc.getBoundingClientRect();
        const c = screenToComplex(e.clientX - rect.left, e.clientY - rect.top, mandelbrot);
        julia.juliaC = [c.re, c.im];
        mandelbrot.juliaC = [c.re, c.im];
        requestRender();
        updateInfo();
      }
      isDragging = false;
      mc.style.cursor = 'crosshair';
    }
  });

  mc.addEventListener('dblclick', e => {
    e.preventDefault();
    const rect = mc.getBoundingClientRect();
    const c = screenToComplex(e.clientX - rect.left, e.clientY - rect.top, mandelbrot);
    mandelbrot.centerX = c.re;
    mandelbrot.centerY = c.im;
    mandelbrot.zoom *= 4;
    requestRender();
    updateInfo();
  });

  mc.style.cursor = 'crosshair';

  // Touch events for mobile
  let lastTouchDist = 0;
  mc.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      dragCenter = { x: mandelbrot.centerX, y: mandelbrot.centerY };
    } else if (e.touches.length === 2) {
      lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
    e.preventDefault();
  }, { passive: false });

  mc.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && isDragging) {
      const rect = mc.getBoundingClientRect();
      const minDim = Math.min(rect.width, rect.height);
      const dx = (e.touches[0].clientX - dragStart.x) / minDim / mandelbrot.zoom;
      const dy = (e.touches[0].clientY - dragStart.y) / minDim / mandelbrot.zoom;
      mandelbrot.centerX = dragCenter.x - dx;
      mandelbrot.centerY = dragCenter.y + dy;
      requestRender();
      updateInfo();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (lastTouchDist > 0) {
        mandelbrot.zoom *= dist / lastTouchDist;
        requestRender();
        updateInfo();
      }
      lastTouchDist = dist;
    }
    e.preventDefault();
  }, { passive: false });

  mc.addEventListener('touchend', () => { isDragging = false; lastTouchDist = 0; });

  // Controls
  document.getElementById('iterations').addEventListener('input', e => {
    const v = parseInt(e.target.value);
    document.getElementById('iter-val').textContent = v;
    mandelbrot.maxIter = v;
    julia.maxIter = v;
    requestRender();
  });

  document.getElementById('palette').addEventListener('change', e => {
    const v = parseInt(e.target.value);
    mandelbrot.palette = v;
    julia.palette = v;
    requestRender();
    updatePalettePreview();
  });

  document.getElementById('smoothing').addEventListener('change', e => {
    mandelbrot.smooth = e.target.checked ? 1 : 0;
    julia.smooth = e.target.checked ? 1 : 0;
    requestRender();
  });

  document.getElementById('phi-toggle').addEventListener('change', e => {
    phiVisible = e.target.checked;
    if (!phiVisible) {
      const c = document.getElementById('phi-overlay');
      c.getContext('2d').clearRect(0, 0, c.width, c.height);
    }
    requestRender();
  });

  document.getElementById('btn-julia').addEventListener('click', () => {
    juliaOpen = !juliaOpen;
    document.getElementById('julia-wrap').classList.toggle('open', juliaOpen);
    document.getElementById('btn-julia').classList.toggle('active', juliaOpen);
    setTimeout(() => requestRender(), 350);
  });

  document.getElementById('btn-export').addEventListener('click', exportPNG);
  document.getElementById('btn-reset').addEventListener('click', resetView);

  // Presets
  const presets = [
    { name: 'Seahorse Valley', x: -0.7463, y: 0.1102, z: 80, iter: 500 },
    { name: 'Mini-Mandelbrot', x: -1.7490863748, y: 0.0, z: 1500, iter: 800 },
    { name: 'Elephant Valley', x: 0.2821, y: 0.0100, z: 50, iter: 400 },
    { name: 'Spiral Arms', x: -0.13856524454488, y: -0.64935990748190, z: 4000, iter: 1000 },
    { name: 'Lightning', x: -0.170337, y: -1.06506, z: 200, iter: 600 },
    { name: 'Double Spiral', x: -0.0452407411, y: 0.9868162204352258, z: 8000, iter: 1200 },
  ];

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = presets[parseInt(btn.dataset.preset)];
      mandelbrot.centerX = p.x;
      mandelbrot.centerY = p.y;
      mandelbrot.zoom = p.z * 0.3;
      mandelbrot.maxIter = p.iter;
      julia.maxIter = p.iter;
      document.getElementById('iterations').value = p.iter;
      document.getElementById('iter-val').textContent = p.iter;
      requestRender();
      updateInfo();
    });
  });

  // Resize
  window.addEventListener('resize', () => requestRender());
}

function resetView() {
  mandelbrot.centerX = -0.5;
  mandelbrot.centerY = 0;
  mandelbrot.zoom = 0.3;
  mandelbrot.maxIter = 200;
  julia.maxIter = 200;
  document.getElementById('iterations').value = 200;
  document.getElementById('iter-val').textContent = 200;
  requestRender();
  updateInfo();
}

function exportPNG() {
  // Render at current resolution
  mandelbrot.render();
  const dataURL = mandelbrot.canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = dataURL;
  const zl = (mandelbrot.zoom / 0.3).toExponential(2);
  a.download = `fractal_${mandelbrot.centerX.toFixed(8)}_${mandelbrot.centerY.toFixed(8)}_z${zl}.png`;
  a.click();
}

// Boot
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
