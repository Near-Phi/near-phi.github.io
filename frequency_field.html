<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Frequency Field — Spectrograph</title>
<style>
  html, body { margin:0; padding:0; background:#000; color:#bbb;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    overflow:hidden; height:100%; user-select:none; }
  #wrap { position:fixed; inset:0; display:flex; flex-direction:column; }
  #topbar { background:#060610; border-bottom:1px solid #1a1a28;
            padding:6px 12px; display:flex; align-items:center;
            gap:18px; font-size:10px; letter-spacing:1.4px;
            text-transform:uppercase; color:#556; flex:0 0 auto; }
  #topbar .sep { color:#223; }
  #topbar .val { color:#aab; font-variant-numeric: tabular-nums; }
  #peaks { color:#7ac2ff; flex:1; white-space:nowrap; overflow:hidden; }
  #waterfall { flex:1 1 auto; display:block; width:100%; height:100%;
               image-rendering: pixelated; background:#000; }
  #controls { background:#060610; border-top:1px solid #1a1a28;
              padding:6px 12px; display:flex; align-items:center; gap:16px;
              font-size:10px; color:#556; letter-spacing:1px; flex:0 0 auto; }
  #controls label { display:flex; align-items:center; gap:6px; }
  #controls input[type=range] { width:120px; }
  #controls button { background:#10101a; border:1px solid #222;
                     color:#889; padding:3px 10px; border-radius:3px;
                     font: inherit; letter-spacing:1px; cursor:pointer; }
  #controls button:hover { color:#dde; border-color:#333; }
  #start { position:fixed; inset:0; display:flex; align-items:center;
           justify-content:center; background:#000; z-index:10; cursor:pointer; }
  #start div { padding:22px 44px; border:1px solid #333; border-radius:4px;
               font-size:13px; color:#888; letter-spacing:2px;
               text-transform:uppercase; }
  #start div:hover { color:#ddd; border-color:#555; }
  .yAxis { position:absolute; left:4px; top:0; font-size:9px;
           color:#334; pointer-events:none; line-height:1; }
  .yAxis span { position:absolute; left:0; }
  #wfWrap { position:relative; flex:1 1 auto; min-height:0; }
</style>
</head>
<body>
<div id="start"><div>click to start microphone</div></div>
<div id="wrap">
  <div id="topbar">
    <span>FREQUENCY FIELD</span><span class="sep">│</span>
    <span>hue = phase</span><span class="sep">│</span>
    <span>brightness = mag &minus; floor</span><span class="sep">│</span>
    <span>peaks: <span id="peaks">—</span></span>
  </div>
  <div id="wfWrap">
    <canvas id="waterfall"></canvas>
    <div class="yAxis" id="yAxis"></div>
  </div>
  <div id="controls">
    <label>gate <input id="gate" type="range" min="0" max="40" value="12" step="1"><span class="val" id="gateVal">12</span> dB</label>
    <label>sat <input id="sat" type="range" min="0" max="100" value="95" step="1"><span class="val" id="satVal">95</span></label>
    <label>gain <input id="gain" type="range" min="0" max="40" value="18" step="1"><span class="val" id="gainVal">18</span> dB</label>
    <label><input id="mono" type="checkbox"> grayscale</label>
    <button id="clearBtn">clear</button>
    <span style="flex:1"></span>
    <span style="color:#334">log f: 30 Hz → 8 kHz</span>
  </div>
</div>

<script>
// ============================================================
//  FREQUENCY FIELD — Honest Phase-Colored Spectrograph
//  Every pixel is a real measurement of the live audio:
//    y  = log frequency (30 Hz .. 8 kHz)
//    x  = time (scrolls left)
//    hue        = FFT bin phase angle
//    lightness  = magnitude above adaptive per-row noise floor
//  Nothing is arbitrary. Nothing is generated.
// ============================================================

const FFT_SIZE = 2048;
const F_MIN = 30;
const F_MAX = 8000;

// ---------- radix-2 complex FFT (in place) ----------
function fft(re, im) {
  const n = re.length;
  let j = 0;
  for (let i = 1; i < n; i++) {
    let bit = n >> 1;
    for (; (j & bit) !== 0; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      let t = re[i]; re[i] = re[j]; re[j] = t;
      t = im[i]; im[i] = im[j]; im[j] = t;
    }
  }
  for (let len = 2; len <= n; len <<= 1) {
    const half = len >> 1;
    const ang = -2 * Math.PI / len;
    const wlenRe = Math.cos(ang), wlenIm = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let wRe = 1, wIm = 0;
      for (let k = 0; k < half; k++) {
        const a = i + k, b = i + k + half;
        const uRe = re[a], uIm = im[a];
        const vRe = re[b]*wRe - im[b]*wIm;
        const vIm = re[b]*wIm + im[b]*wRe;
        re[a] = uRe + vRe; im[a] = uIm + vIm;
        re[b] = uRe - vRe; im[b] = uIm - vIm;
        const nwRe = wRe*wlenRe - wIm*wlenIm;
        wIm = wRe*wlenIm + wIm*wlenRe;
        wRe = nwRe;
      }
    }
  }
}

// ---------- Hann window ----------
const window_ = new Float32Array(FFT_SIZE);
for (let i = 0; i < FFT_SIZE; i++) {
  window_[i] = 0.5 * (1 - Math.cos(2*Math.PI*i/(FFT_SIZE-1)));
}

// ---------- HSL → RGB ----------
function hsl2rgb(h, s, l, out, off) {
  // h in [0,360), s,l in [0,1]
  const c = (1 - Math.abs(2*l - 1)) * s;
  const hp = h / 60;
  const x = c * (1 - Math.abs(hp % 2 - 1));
  let r=0, g=0, b=0;
  if      (hp < 1) { r=c; g=x; }
  else if (hp < 2) { r=x; g=c; }
  else if (hp < 3) { g=c; b=x; }
  else if (hp < 4) { g=x; b=c; }
  else if (hp < 5) { r=x; b=c; }
  else             { r=c; b=x; }
  const m = l - c/2;
  out[off  ] = (r+m)*255;
  out[off+1] = (g+m)*255;
  out[off+2] = (b+m)*255;
  out[off+3] = 255;
}

// ---------- canvases & sizing ----------
const wfCvs = document.getElementById('waterfall');
const wfCtx = wfCvs.getContext('2d', { alpha: false });
let WF_W = 1, WF_H = 1;
let wfImg, wfData;
let noiseFloor;   // per-row running minimum (magnitude units)
let freqForRow;   // per-row frequency (Hz)
let binForRow;    // per-row floating bin index
function resize() {
  const wrapRect = document.getElementById('wfWrap').getBoundingClientRect();
  WF_W = Math.max(256, Math.floor(wrapRect.width));
  WF_H = Math.max(128, Math.floor(wrapRect.height));
  wfCvs.width = WF_W; wfCvs.height = WF_H;
  wfImg = wfCtx.createImageData(WF_W, WF_H);
  wfData = wfImg.data;
  // initialize black
  for (let i = 3; i < wfData.length; i += 4) wfData[i] = 255;
  noiseFloor = new Float32Array(WF_H).fill(1e-4);
  freqForRow = new Float32Array(WF_H);
  binForRow = new Float32Array(WF_H);
  for (let y = 0; y < WF_H; y++) {
    const t = 1 - y/(WF_H-1);              // y=0 is top (high freq)
    const f = F_MIN * Math.pow(F_MAX/F_MIN, t);
    freqForRow[y] = f;
    // actual bin is set once sampleRate is known
  }
  drawYAxis();
}
window.addEventListener('resize', resize);

function drawYAxis() {
  const axis = document.getElementById('yAxis');
  axis.innerHTML = '';
  const marks = [30, 100, 300, 1000, 3000, 8000];
  for (const f of marks) {
    const t = Math.log(f/F_MIN) / Math.log(F_MAX/F_MIN); // 0 at F_MIN
    const y = Math.round((1 - t) * (WF_H - 1));
    const el = document.createElement('span');
    el.textContent = (f >= 1000 ? (f/1000) + 'k' : f) + ' Hz';
    el.style.top = y + 'px';
    axis.appendChild(el);
  }
}

// ---------- audio ----------
let audioCtx, analyser, sampleRate, timeData;
let started = false;
const reBuf = new Float32Array(FFT_SIZE);
const imBuf = new Float32Array(FFT_SIZE);

document.getElementById('start').addEventListener('click', async () => {
  if (started) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    sampleRate = audioCtx.sampleRate;
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0;
    src.connect(analyser);
    timeData = new Float32Array(FFT_SIZE);
    resize();
    // now that sampleRate is known, compute bin indices per row
    for (let y = 0; y < WF_H; y++) {
      binForRow[y] = freqForRow[y] * FFT_SIZE / sampleRate;
    }
    document.getElementById('start').style.display = 'none';
    started = true;
    requestAnimationFrame(frame);
  } catch (e) {
    document.getElementById('start').innerHTML =
      '<div>MIC DENIED — ' + (e.message || e) + '</div>';
  }
});

// ---------- controls ----------
const gateSlider = document.getElementById('gate');
const satSlider  = document.getElementById('sat');
const gainSlider = document.getElementById('gain');
const monoBox    = document.getElementById('mono');
const gateVal = document.getElementById('gateVal');
const satVal  = document.getElementById('satVal');
const gainVal = document.getElementById('gainVal');
gateSlider.oninput = () => gateVal.textContent = gateSlider.value;
satSlider.oninput  = () => satVal.textContent  = satSlider.value;
gainSlider.oninput = () => gainVal.textContent = gainSlider.value;
document.getElementById('clearBtn').onclick = () => {
  for (let i = 0; i < wfData.length; i += 4) {
    wfData[i]=0; wfData[i+1]=0; wfData[i+2]=0; wfData[i+3]=255;
  }
  wfCtx.putImageData(wfImg, 0, 0);
  noiseFloor.fill(1e-4);
};

// ---------- main loop ----------
function frame() {
  analyser.getFloatTimeDomainData(timeData);

  // load into FFT buffers with Hann window
  for (let i = 0; i < FFT_SIZE; i++) {
    reBuf[i] = timeData[i] * window_[i];
    imBuf[i] = 0;
  }
  fft(reBuf, imBuf);

  // shift waterfall left by 1 pixel, row by row (cheap copyWithin)
  const rowBytes = WF_W * 4;
  for (let y = 0; y < WF_H; y++) {
    const rs = y * rowBytes;
    wfData.copyWithin(rs, rs + 4, rs + rowBytes);
  }

  const gateDb = parseFloat(gateSlider.value);
  const gateLin = Math.pow(10, gateDb/20);
  const sat = parseFloat(satSlider.value) / 100;
  const gainDb = parseFloat(gainSlider.value);
  const gainLin = Math.pow(10, gainDb/20);
  const mono = monoBox.checked;

  // new rightmost column
  const xCol = WF_W - 1;
  let peakMag = 0, peakY = -1;
  // track top peaks for readout
  const peakList = []; // {mag, freq}

  for (let y = 0; y < WF_H; y++) {
    const bf = binForRow[y];
    const b0 = Math.floor(bf);
    const frac = bf - b0;
    // linear interpolation between adjacent FFT bins for smoother log axis
    const reA = reBuf[b0] * (1-frac) + reBuf[b0+1] * frac;
    const imA = imBuf[b0] * (1-frac) + imBuf[b0+1] * frac;
    const mag = Math.sqrt(reA*reA + imA*imA) * (2 / FFT_SIZE) * gainLin;
    const phase = Math.atan2(imA, reA); // [-π, π]

    // adaptive noise floor: slow minimum follower with upward leak
    if (mag < noiseFloor[y]) noiseFloor[y] = mag * 0.999 + noiseFloor[y] * 0.001;
    else noiseFloor[y] *= 1.0003;
    if (noiseFloor[y] < 1e-6) noiseFloor[y] = 1e-6;

    const floor = noiseFloor[y] * gateLin;
    const ratio = mag / floor;
    // gate: must be >gateDb above floor
    const idx = (y * WF_W + xCol) * 4;
    if (ratio > 1) {
      // lightness from log10 ratio, capped
      const dBabove = 20 * Math.log10(ratio);
      let l = Math.min(0.58, dBabove / 60 + 0.05);
      if (l < 0) l = 0;
      if (mono) {
        const v = l * 255 * 1.7;
        wfData[idx  ] = v;
        wfData[idx+1] = v;
        wfData[idx+2] = v;
        wfData[idx+3] = 255;
      } else {
        const hue = ((phase + Math.PI) / (2*Math.PI)) * 360;
        hsl2rgb(hue, sat, l, wfData, idx);
      }
      // peak tracking
      if (mag > peakMag) { peakMag = mag; peakY = y; }
      peakList.push({ mag: mag, freq: freqForRow[y], y: y });
    } else {
      wfData[idx  ] = 0;
      wfData[idx+1] = 0;
      wfData[idx+2] = 0;
      wfData[idx+3] = 255;
    }
  }

  wfCtx.putImageData(wfImg, 0, 0);

  // readout: top 5 peaks, de-duplicated by ±10 rows
  peakList.sort((a,b) => b.mag - a.mag);
  const chosen = [];
  for (const p of peakList) {
    if (chosen.every(q => Math.abs(q.y - p.y) > 10)) chosen.push(p);
    if (chosen.length >= 5) break;
  }
  const str = chosen.map(p => {
    const f = p.freq;
    return (f >= 1000 ? (f/1000).toFixed(2)+'k' : f.toFixed(0)) + 'Hz';
  }).join('   ');
  document.getElementById('peaks').textContent = str || '—';

  requestAnimationFrame(frame);
}
</script>
</body>
</html>
