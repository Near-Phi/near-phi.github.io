<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Particle Physics Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #c0c0d0; font-family: 'Segoe UI', Consolas, monospace; overflow: hidden; display: flex; height: 100vh; }

#sidebar {
  width: 320px; min-width: 320px; background: #12121a; border-right: 1px solid #2a2a3a;
  overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px;
  scrollbar-width: thin; scrollbar-color: #3a3a5a #12121a;
}
#sidebar h2 { color: #80b0ff; font-size: 14px; margin: 8px 0 4px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a3a; padding-bottom: 4px; }
#sidebar h1 { color: #d4af37; font-size: 16px; text-align: center; margin-bottom: 4px; }

.ctrl-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.ctrl-row label { font-size: 11px; flex: 1; white-space: nowrap; }
.ctrl-row input[type=range] { width: 110px; accent-color: #80b0ff; }
.ctrl-row .val { font-size: 10px; color: #80b0ff; min-width: 40px; text-align: right; }

.btn { background: #1a1a2e; border: 1px solid #3a3a5a; color: #c0c0d0; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 11px; transition: all 0.15s; }
.btn:hover { background: #2a2a4e; border-color: #6a6aaa; }
.btn.active { background: #2a3a5e; border-color: #80b0ff; color: #80b0ff; }
.btn-row { display: flex; gap: 4px; flex-wrap: wrap; }

.preset-btn { background: #1a1a2e; border: 1px solid #3a3a5a; color: #d4af37; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 10px; }
.preset-btn:hover { background: #2a2a3e; border-color: #d4af37; }

.toggle-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.toggle-row input[type=checkbox] { accent-color: #80b0ff; }

select { background: #1a1a2e; border: 1px solid #3a3a5a; color: #c0c0d0; padding: 3px 6px; border-radius: 4px; font-size: 11px; }

#canvas-wrap { flex: 1; position: relative; }
canvas { display: block; }
#main-canvas { width: 100%; height: 100%; }

#overlay-panels { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
#overlay-panels > div { pointer-events: auto; background: rgba(10,10,20,0.85); border: 1px solid #2a2a3a; border-radius: 6px; padding: 6px; }
#phase-panel canvas, #energy-panel canvas { border-radius: 4px; }

#stats { position: absolute; bottom: 8px; left: 8px; font-size: 11px; color: #606080; pointer-events: none; }
#help-hint { position: absolute; bottom: 8px; right: 8px; font-size: 10px; color: #404060; pointer-events: none; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Particle Simulator</h1>

  <h2>Presets</h2>
  <div class="btn-row">
    <button class="preset-btn" onclick="loadPreset('solar')">Solar System</button>
    <button class="preset-btn" onclick="loadPreset('galaxy')">Galaxy</button>
    <button class="preset-btn" onclick="loadPreset('molecular')">Molecular</button>
    <button class="preset-btn" onclick="loadPreset('phi')">Phi Spiral</button>
    <button class="preset-btn" onclick="loadPreset('pendulum')">Dbl Pendulum</button>
    <button class="preset-btn" onclick="loadPreset('threebody')">Three-Body</button>
  </div>

  <h2>Particles</h2>
  <div class="ctrl-row"><label>Count</label><input type="range" id="sl-count" min="2" max="1000" value="200"><span class="val" id="v-count">200</span></div>

  <h2>Forces</h2>
  <div class="toggle-row"><input type="checkbox" id="f-gravity" checked><label for="f-gravity">Gravity (1/r²)</label></div>
  <div class="ctrl-row"><label>G strength</label><input type="range" id="sl-G" min="0" max="500" value="100"><span class="val" id="v-G">100</span></div>
  <div class="toggle-row"><input type="checkbox" id="f-electro"><label for="f-electro">Electrostatic</label></div>
  <div class="ctrl-row"><label>k_e strength</label><input type="range" id="sl-ke" min="0" max="500" value="100"><span class="val" id="v-ke">100</span></div>
  <div class="toggle-row"><input type="checkbox" id="f-spring"><label for="f-spring">Spring Forces</label></div>
  <div class="ctrl-row"><label>k_spring</label><input type="range" id="sl-ks" min="0" max="200" value="50"><span class="val" id="v-ks">50</span></div>
  <div class="toggle-row"><input type="checkbox" id="f-lj"><label for="f-lj">Lennard-Jones</label></div>
  <div class="ctrl-row"><label>LJ epsilon</label><input type="range" id="sl-lj" min="0" max="200" value="50"><span class="val" id="v-lj">50</span></div>
  <div class="toggle-row"><input type="checkbox" id="f-phi"><label for="f-phi">Phi Force (golden)</label></div>
  <div class="ctrl-row"><label>Phi strength</label><input type="range" id="sl-phi" min="0" max="500" value="100"><span class="val" id="v-phi">100</span></div>

  <h2>Simulation</h2>
  <div class="ctrl-row"><label>Time step</label><input type="range" id="sl-dt" min="1" max="200" value="50"><span class="val" id="v-dt">0.50</span></div>
  <div class="ctrl-row"><label>Softening</label><input type="range" id="sl-soft" min="1" max="100" value="20"><span class="val" id="v-soft">20</span></div>
  <div class="ctrl-row"><label>Damping</label><input type="range" id="sl-damp" min="900" max="1000" value="999"><span class="val" id="v-damp">0.999</span></div>
  <div class="ctrl-row"><label>Boundary</label>
    <select id="sel-boundary"><option value="none">None</option><option value="wrap">Wrap</option><option value="bounce" selected>Bounce</option></select>
  </div>

  <h2>Visuals</h2>
  <div class="ctrl-row"><label>Trail length</label><input type="range" id="sl-trail" min="0" max="500" value="60"><span class="val" id="v-trail">60</span></div>
  <div class="ctrl-row"><label>Color by</label>
    <select id="sel-color"><option value="velocity">Velocity</option><option value="energy">Energy</option><option value="charge">Charge</option><option value="mass">Mass</option><option value="age">Age</option></select>
  </div>
  <div class="toggle-row"><input type="checkbox" id="cb-glow" checked><label for="cb-glow">Glow effect</label></div>
  <div class="toggle-row"><input type="checkbox" id="cb-com"><label for="cb-com">Center of mass</label></div>
  <div class="toggle-row"><input type="checkbox" id="cb-connections"><label for="cb-connections">Spring connections</label></div>

  <h2>Overlays</h2>
  <div class="toggle-row"><input type="checkbox" id="cb-phase"><label for="cb-phase">Phase space</label></div>
  <div class="toggle-row"><input type="checkbox" id="cb-energy"><label for="cb-energy">Energy plot</label></div>

  <h2>Playback</h2>
  <div class="btn-row">
    <button class="btn" id="btn-play" onclick="togglePause()">Pause</button>
    <button class="btn" onclick="stepOnce()">Step</button>
    <button class="btn" onclick="resetSim()">Reset</button>
  </div>

  <h2>Export</h2>
  <div class="btn-row">
    <button class="btn" onclick="exportJSON()">Save JSON</button>
    <button class="btn" onclick="exportPNG()">Save PNG</button>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="main-canvas"></canvas>
  <div id="overlay-panels">
    <div id="phase-panel" style="display:none"><canvas id="phase-canvas" width="200" height="200"></canvas></div>
    <div id="energy-panel" style="display:none"><canvas id="energy-canvas" width="200" height="120"></canvas></div>
  </div>
  <div id="stats"></div>
  <div id="help-hint">LClick: add | Drag: launch | RClick: attractor | Scroll: zoom</div>
</div>

<script>
// ========== CONSTANTS ==========
const PHI = (1 + Math.sqrt(5)) / 2;
const TAU = Math.PI * 2;

// ========== CANVAS SETUP ==========
const mainCanvas = document.getElementById('main-canvas');
const ctx = mainCanvas.getContext('2d');
const phaseCanvas = document.getElementById('phase-canvas');
const phaseCtx = phaseCanvas.getContext('2d');
const energyCanvas = document.getElementById('energy-canvas');
const energyCtx = energyCanvas.getContext('2d');

let W, H;
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth; H = wrap.clientHeight;
  mainCanvas.width = W; mainCanvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ========== STATE ==========
let particles = [];
let springs = [];
let paused = false;
let frameCount = 0;
let energyHistory = [];
let camera = { x: 0, y: 0, zoom: 1 };
let dragStart = null;
let dragCurrent = null;
let isDragging = false;

// ========== QUADTREE ==========
class QuadTree {
  constructor(x, y, w, h, depth = 0) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.depth = depth;
    this.particles = [];
    this.children = null;
    this.totalMass = 0; this.comX = 0; this.comY = 0;
    this.totalCharge = 0;
  }
  insert(p) {
    if (p.x < this.x || p.x > this.x + this.w || p.y < this.y || p.y > this.y + this.h) return;
    this.totalMass += p.mass;
    this.comX += p.x * p.mass;
    this.comY += p.y * p.mass;
    this.totalCharge += p.charge;
    if (this.children === null) {
      this.particles.push(p);
      if (this.particles.length > 8 && this.depth < 12) this.subdivide();
      return;
    }
    for (const c of this.children) c.insert(p);
  }
  subdivide() {
    const hw = this.w / 2, hh = this.h / 2;
    this.children = [
      new QuadTree(this.x, this.y, hw, hh, this.depth + 1),
      new QuadTree(this.x + hw, this.y, hw, hh, this.depth + 1),
      new QuadTree(this.x, this.y + hh, hw, hh, this.depth + 1),
      new QuadTree(this.x + hw, this.y + hh, hw, hh, this.depth + 1),
    ];
    for (const p of this.particles) {
      for (const c of this.children) c.insert(p);
    }
    this.particles = [];
  }
  finalize() {
    if (this.totalMass > 0) { this.comX /= this.totalMass; this.comY /= this.totalMass; }
    if (this.children) for (const c of this.children) c.finalize();
  }
  computeForce(p, G, ke, softSq, theta, fx, fy) {
    if (this.totalMass === 0) return;
    const dx = (this.children ? this.comX : (this.particles.length === 1 ? this.particles[0].x : this.comX)) - p.x;
    const dy = (this.children ? this.comY : (this.particles.length === 1 ? this.particles[0].y : this.comY)) - p.y;
    const distSq = dx * dx + dy * dy + softSq;
    const s = this.w;
    if (this.children === null || (s * s / distSq < theta * theta)) {
      // Treat as single body
      if (this.children === null) {
        for (const q of this.particles) {
          if (q === p) continue;
          const ddx = q.x - p.x, ddy = q.y - p.y;
          const dSq = ddx * ddx + ddy * ddy + softSq;
          const dist = Math.sqrt(dSq);
          const invD = 1 / dist;
          const invD2 = invD * invD;
          // Gravity
          if (G > 0) {
            const f = G * p.mass * q.mass * invD2 * invD;
            fx.v += f * ddx; fy.v += f * ddy;
          }
          // Electrostatic
          if (ke > 0) {
            const f = -ke * p.charge * q.charge * invD2 * invD;
            fx.v += f * ddx; fy.v += f * ddy;
          }
        }
      } else {
        const dist = Math.sqrt(distSq);
        const invD = 1 / dist;
        const invD2 = invD * invD;
        if (G > 0) {
          const f = G * p.mass * this.totalMass * invD2 * invD;
          fx.v += f * dx; fy.v += f * dy;
        }
        if (ke > 0) {
          const f = -ke * p.charge * this.totalCharge * invD2 * invD;
          fx.v += f * dx; fy.v += f * dy;
        }
      }
    } else {
      for (const c of this.children) c.computeForce(p, G, ke, softSq, theta, fx, fy);
    }
  }
}

// ========== PARTICLE ==========
function makeParticle(x, y, vx, vy, mass, charge) {
  return {
    x, y, vx, vy, mass: mass || 1, charge: charge || 0,
    ox: x, oy: y, // old position for Verlet
    ax: 0, ay: 0,
    trail: [],
    age: 0,
    id: Math.random()
  };
}

// ========== CONFIG READS ==========
function getVal(id) { return parseFloat(document.getElementById(id).value); }
function isOn(id) { return document.getElementById(id).checked; }

function readConfig() {
  return {
    G: getVal('sl-G') * 0.01,
    ke: getVal('sl-ke') * 0.1,
    ks: getVal('sl-ks') * 0.001,
    ljEps: getVal('sl-lj') * 0.01,
    phiStr: getVal('sl-phi') * 0.01,
    dt: getVal('sl-dt') * 0.01,
    soft: getVal('sl-soft'),
    damp: getVal('sl-damp') / 1000,
    trailLen: Math.round(getVal('sl-trail')),
    gravity: isOn('f-gravity'),
    electro: isOn('f-electro'),
    spring: isOn('f-spring'),
    lj: isOn('f-lj'),
    phi: isOn('f-phi'),
    glow: isOn('cb-glow'),
    com: isOn('cb-com'),
    connections: isOn('cb-connections'),
    phase: isOn('cb-phase'),
    energy: isOn('cb-energy'),
    boundary: document.getElementById('sel-boundary').value,
    colorBy: document.getElementById('sel-color').value,
  };
}

// ========== UPDATE DISPLAY VALUES ==========
function hookSliders() {
  const pairs = [
    ['sl-count','v-count',v=>Math.round(v)],
    ['sl-G','v-G',v=>v],
    ['sl-ke','v-ke',v=>v],
    ['sl-ks','v-ks',v=>v],
    ['sl-lj','v-lj',v=>v],
    ['sl-phi','v-phi',v=>v],
    ['sl-dt','v-dt',v=>(v*0.01).toFixed(2)],
    ['sl-soft','v-soft',v=>v],
    ['sl-damp','v-damp',v=>(v/1000).toFixed(3)],
    ['sl-trail','v-trail',v=>Math.round(v)],
  ];
  pairs.forEach(([sl,vl,fmt]) => {
    const s = document.getElementById(sl);
    const v = document.getElementById(vl);
    s.addEventListener('input', () => { v.textContent = fmt(parseFloat(s.value)); });
  });
}
hookSliders();

// ========== FORCE COMPUTATION ==========
function computeForces(cfg) {
  const N = particles.length;
  const softSq = cfg.soft * cfg.soft;
  const ljSigma = 15; // characteristic distance for LJ

  // Build quadtree for gravity and electrostatic
  if ((cfg.gravity && cfg.G > 0) || (cfg.electro && cfg.ke > 0)) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of particles) {
      if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
      if (p.x > maxX) maxX = p.x; if (p.y > maxY) maxY = p.y;
    }
    const pad = 10;
    const sz = Math.max(maxX - minX, maxY - minY) + pad * 2;
    const qt = new QuadTree(minX - pad, minY - pad, sz, sz);
    for (const p of particles) qt.insert(p);
    qt.finalize();

    const G = cfg.gravity ? cfg.G : 0;
    const ke = cfg.electro ? cfg.ke : 0;
    for (const p of particles) {
      const fx = {v:0}, fy = {v:0};
      qt.computeForce(p, G, ke, softSq, 0.7, fx, fy);
      p.ax += fx.v / p.mass;
      p.ay += fy.v / p.mass;
    }
  }

  // Lennard-Jones (only short range, use cutoff)
  if (cfg.lj && cfg.ljEps > 0) {
    const eps = cfg.ljEps;
    const sig = ljSigma;
    const sig6 = sig ** 6;
    const cutoff = sig * 2.5;
    const cutSq = cutoff * cutoff;
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = particles[j].x - particles[i].x;
        const dy = particles[j].y - particles[i].y;
        const dSq = dx * dx + dy * dy + 1;
        if (dSq > cutSq) continue;
        const r2 = dSq;
        const r6 = r2 * r2 * r2;
        const r12 = r6 * r6;
        const s6r6 = sig6 / r6;
        const f = 24 * eps * (2 * s6r6 * s6r6 - s6r6) / r2;
        const fx = f * dx, fy = f * dy;
        particles[i].ax += fx / particles[i].mass;
        particles[i].ay += fy / particles[i].mass;
        particles[j].ax -= fx / particles[j].mass;
        particles[j].ay -= fy / particles[j].mass;
      }
    }
  }

  // Spring forces
  if (cfg.spring && cfg.ks > 0) {
    for (const s of springs) {
      const a = particles[s.a], b = particles[s.b];
      if (!a || !b) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
      const f = cfg.ks * (dist - s.rest);
      const fx = f * dx / dist, fy = f * dy / dist;
      a.ax += fx / a.mass; a.ay += fy / a.mass;
      b.ax -= fx / b.mass; b.ay -= fy / b.mass;
    }
  }

  // Phi force: F proportional to phi^(-r/scale), tangential component for spirals
  if (cfg.phi && cfg.phiStr > 0) {
    // Find center of mass
    let cx = 0, cy = 0, tm = 0;
    for (const p of particles) { cx += p.x * p.mass; cy += p.y * p.mass; tm += p.mass; }
    cx /= tm; cy /= tm;
    const scale = 50;
    for (const p of particles) {
      const dx = cx - p.x, dy = cy - p.y;
      const r = Math.sqrt(dx * dx + dy * dy) + 1;
      const fMag = cfg.phiStr * p.mass * Math.pow(PHI, -r / scale);
      // Radial + tangential (golden angle rotation)
      const goldenAngle = TAU / (PHI * PHI);
      const cosA = Math.cos(goldenAngle), sinA = Math.sin(goldenAngle);
      const nx = dx / r, ny = dy / r;
      // Radial attraction + tangential kick
      const radF = fMag * 0.6;
      const tanF = fMag * 0.4;
      p.ax += (radF * nx + tanF * (-ny)) / p.mass;
      p.ay += (radF * ny + tanF * nx) / p.mass;
    }
  }
}

// ========== INTEGRATION (Velocity Verlet) ==========
function integrate(cfg) {
  const dt = cfg.dt;
  const damp = cfg.damp;
  const N = particles.length;

  // Save old accelerations, reset
  for (const p of particles) {
    p.oax = p.ax; p.oay = p.ay;
    p.ax = 0; p.ay = 0;
  }

  // Compute new forces
  computeForces(cfg);

  // Velocity Verlet update
  for (const p of particles) {
    // Update velocity using average of old and new acceleration
    p.vx += 0.5 * (p.oax + p.ax) * dt;
    p.vy += 0.5 * (p.oay + p.ay) * dt;
    // Damping
    p.vx *= damp; p.vy *= damp;
    // Update position
    p.x += p.vx * dt + 0.5 * p.ax * dt * dt;
    p.y += p.vy * dt + 0.5 * p.ay * dt * dt;
    p.age++;

    // Trail
    if (cfg.trailLen > 0) {
      p.trail.push(p.x, p.y);
      if (p.trail.length > cfg.trailLen * 2) {
        p.trail.splice(0, p.trail.length - cfg.trailLen * 2);
      }
    } else {
      p.trail.length = 0;
    }

    // Boundary
    if (cfg.boundary === 'bounce') {
      const hw = W / (2 * camera.zoom), hh = H / (2 * camera.zoom);
      const cx = camera.x, cy = camera.y;
      if (p.x < cx - hw) { p.x = cx - hw; p.vx *= -0.8; }
      if (p.x > cx + hw) { p.x = cx + hw; p.vx *= -0.8; }
      if (p.y < cy - hh) { p.y = cy - hh; p.vy *= -0.8; }
      if (p.y > cy + hh) { p.y = cy + hh; p.vy *= -0.8; }
    } else if (cfg.boundary === 'wrap') {
      const hw = W / (2 * camera.zoom), hh = H / (2 * camera.zoom);
      const cx = camera.x, cy = camera.y;
      if (p.x < cx - hw) p.x += 2 * hw;
      if (p.x > cx + hw) p.x -= 2 * hw;
      if (p.y < cy - hh) p.y += 2 * hh;
      if (p.y > cy + hh) p.y -= 2 * hh;
    }
  }
}

// ========== ENERGY CALCULATION ==========
function calcEnergy(cfg) {
  let KE = 0, PE = 0;
  for (const p of particles) {
    KE += 0.5 * p.mass * (p.vx * p.vx + p.vy * p.vy);
  }
  // Gravitational PE (sampled for performance)
  if (cfg.gravity && cfg.G > 0) {
    const N = particles.length;
    const step = N > 200 ? Math.ceil(N / 100) : 1;
    const scale = N > 200 ? (N * (N - 1) / 2) / (Math.ceil(N / step) * (Math.ceil(N / step) - 1) / 2 || 1) : 1;
    for (let i = 0; i < N; i += step) {
      for (let j = i + step; j < N; j += step) {
        const dx = particles[j].x - particles[i].x;
        const dy = particles[j].y - particles[i].y;
        const r = Math.sqrt(dx * dx + dy * dy + cfg.soft * cfg.soft);
        PE -= cfg.G * particles[i].mass * particles[j].mass / r;
      }
    }
    PE *= scale;
  }
  return { KE, PE, total: KE + PE };
}

// ========== COLOR MAPPING ==========
function velocityToColor(vx, vy) {
  const speed = Math.sqrt(vx * vx + vy * vy);
  const t = Math.min(speed / 5, 1);
  // Blue -> Cyan -> Green -> Yellow -> Red -> White
  if (t < 0.25) return lerpColor([30,80,220],[30,200,220], t/0.25);
  if (t < 0.5) return lerpColor([30,200,220],[80,220,80], (t-0.25)/0.25);
  if (t < 0.75) return lerpColor([80,220,80],[255,220,50], (t-0.5)/0.25);
  return lerpColor([255,220,50],[255,100,80], (t-0.75)/0.25);
}

function chargeToColor(charge) {
  if (charge > 0) return [255, 80 + 175 * Math.min(charge, 1), 80];
  if (charge < 0) return [80, 80 + 175 * Math.min(-charge, 1), 255];
  return [180, 180, 180];
}

function massToColor(mass) {
  const t = Math.min(mass / 20, 1);
  return lerpColor([100, 150, 255], [255, 200, 50], t);
}

function ageToColor(age) {
  const t = Math.min(age / 1000, 1);
  return lerpColor([255, 255, 255], [255, 50, 50], t);
}

function energyToColor(p, cfg) {
  const ke = 0.5 * p.mass * (p.vx * p.vx + p.vy * p.vy);
  const t = Math.min(ke / 50, 1);
  return lerpColor([50, 50, 255], [255, 50, 50], t);
}

function lerpColor(a, b, t) {
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
}

function getColor(p, cfg) {
  switch (cfg.colorBy) {
    case 'velocity': return velocityToColor(p.vx, p.vy);
    case 'charge': return chargeToColor(p.charge);
    case 'mass': return massToColor(p.mass);
    case 'age': return ageToColor(p.age);
    case 'energy': return energyToColor(p, cfg);
    default: return velocityToColor(p.vx, p.vy);
  }
}

// ========== RENDER ==========
function render(cfg) {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // If no trails, clear fully
  if (cfg.trailLen === 0) {
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);
  }

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  // Spring connections
  if (cfg.connections && cfg.spring) {
    ctx.strokeStyle = 'rgba(100,150,255,0.15)';
    ctx.lineWidth = 0.5 / camera.zoom;
    for (const s of springs) {
      const a = particles[s.a], b = particles[s.b];
      if (!a || !b) continue;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
  }

  // Particles
  for (const p of particles) {
    const col = getColor(p, cfg);
    const r = Math.max(1.5, Math.sqrt(p.mass) * 1.5) / camera.zoom;

    // Trail
    if (cfg.trailLen > 0 && p.trail.length >= 4) {
      const tLen = p.trail.length;
      ctx.beginPath();
      ctx.moveTo(p.trail[0], p.trail[1]);
      for (let i = 2; i < tLen; i += 2) {
        ctx.lineTo(p.trail[i], p.trail[i+1]);
      }
      ctx.lineTo(p.x, p.y);
      const alpha = 0.4;
      ctx.strokeStyle = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},${alpha})`;
      ctx.lineWidth = r * 0.5;
      ctx.stroke();
    }

    // Glow
    if (cfg.glow) {
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 4);
      grad.addColorStop(0, `rgba(${col[0]|0},${col[1]|0},${col[2]|0},0.6)`);
      grad.addColorStop(0.3, `rgba(${col[0]|0},${col[1]|0},${col[2]|0},0.15)`);
      grad.addColorStop(1, `rgba(${col[0]|0},${col[1]|0},${col[2]|0},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 4, 0, TAU);
      ctx.fill();
    }

    // Core
    ctx.fillStyle = `rgb(${col[0]|0},${col[1]|0},${col[2]|0})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, TAU);
    ctx.fill();
  }

  // Center of mass
  if (cfg.com && particles.length > 0) {
    let cx = 0, cy = 0, tm = 0;
    for (const p of particles) { cx += p.x * p.mass; cy += p.y * p.mass; tm += p.mass; }
    cx /= tm; cy /= tm;
    ctx.strokeStyle = '#d4af37';
    ctx.lineWidth = 1 / camera.zoom;
    ctx.beginPath();
    ctx.moveTo(cx - 8/camera.zoom, cy); ctx.lineTo(cx + 8/camera.zoom, cy);
    ctx.moveTo(cx, cy - 8/camera.zoom); ctx.lineTo(cx, cy + 8/camera.zoom);
    ctx.stroke();
  }

  // Drag arrow
  if (isDragging && dragStart && dragCurrent) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2 / camera.zoom;
    ctx.setLineDash([5 / camera.zoom, 5 / camera.zoom]);
    ctx.beginPath();
    ctx.moveTo(dragStart.x, dragStart.y);
    ctx.lineTo(dragCurrent.x, dragCurrent.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();

  // Phase space overlay
  if (cfg.phase) {
    document.getElementById('phase-panel').style.display = '';
    renderPhaseSpace();
  } else {
    document.getElementById('phase-panel').style.display = 'none';
  }

  // Energy overlay
  if (cfg.energy) {
    document.getElementById('energy-panel').style.display = '';
    if (frameCount % 3 === 0) {
      const e = calcEnergy(cfg);
      energyHistory.push(e);
      if (energyHistory.length > 300) energyHistory.shift();
    }
    renderEnergyPlot();
  } else {
    document.getElementById('energy-panel').style.display = 'none';
  }

  // Stats
  const stats = document.getElementById('stats');
  const speed = particles.length > 0 ? Math.sqrt(particles[0].vx ** 2 + particles[0].vy ** 2).toFixed(1) : 0;
  stats.textContent = `Particles: ${particles.length} | Frame: ${frameCount} | Zoom: ${camera.zoom.toFixed(2)}x`;
}

function renderPhaseSpace() {
  const w = 200, h = 200;
  phaseCtx.fillStyle = 'rgba(10,10,20,0.3)';
  phaseCtx.fillRect(0, 0, w, h);
  // Axes
  phaseCtx.strokeStyle = '#333';
  phaseCtx.beginPath();
  phaseCtx.moveTo(w/2, 0); phaseCtx.lineTo(w/2, h);
  phaseCtx.moveTo(0, h/2); phaseCtx.lineTo(w, h/2);
  phaseCtx.stroke();
  // Plot x vs vx
  const scaleP = 0.1, scaleV = 5;
  for (const p of particles) {
    const px = w/2 + (p.x - camera.x) * scaleP * camera.zoom;
    const py = h/2 - p.vx * scaleV;
    if (px < 0 || px > w || py < 0 || py > h) continue;
    const col = getColor(p, readConfig());
    phaseCtx.fillStyle = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},0.7)`;
    phaseCtx.fillRect(px, py, 2, 2);
  }
  phaseCtx.fillStyle = '#606080';
  phaseCtx.font = '9px monospace';
  phaseCtx.fillText('Phase: x vs vx', 4, 12);
}

function renderEnergyPlot() {
  const w = 200, h = 120;
  energyCtx.fillStyle = '#0a0a14';
  energyCtx.fillRect(0, 0, w, h);
  if (energyHistory.length < 2) return;
  // Find range
  let maxE = -Infinity, minE = Infinity;
  for (const e of energyHistory) {
    const vals = [e.KE, e.PE, e.total];
    for (const v of vals) { if (v > maxE) maxE = v; if (v < minE) minE = v; }
  }
  const range = maxE - minE || 1;
  const drawLine = (key, color) => {
    energyCtx.strokeStyle = color;
    energyCtx.lineWidth = 1;
    energyCtx.beginPath();
    for (let i = 0; i < energyHistory.length; i++) {
      const x = (i / energyHistory.length) * w;
      const y = h - ((energyHistory[i][key] - minE) / range) * (h - 20) - 10;
      if (i === 0) energyCtx.moveTo(x, y); else energyCtx.lineTo(x, y);
    }
    energyCtx.stroke();
  };
  drawLine('KE', '#ff6644');
  drawLine('PE', '#4488ff');
  drawLine('total', '#44ff88');
  energyCtx.fillStyle = '#606080';
  energyCtx.font = '9px monospace';
  energyCtx.fillStyle = '#ff6644'; energyCtx.fillText('KE', 4, 12);
  energyCtx.fillStyle = '#4488ff'; energyCtx.fillText('PE', 30, 12);
  energyCtx.fillStyle = '#44ff88'; energyCtx.fillText('Total', 52, 12);
}

// ========== PRESETS ==========
function loadPreset(name) {
  particles = [];
  springs = [];
  energyHistory = [];
  camera = { x: W/2, y: H/2, zoom: 1 };

  const cx = W / 2, cy = H / 2;

  // Reset force toggles
  ['f-gravity','f-electro','f-spring','f-lj','f-phi'].forEach(id => document.getElementById(id).checked = false);

  switch (name) {
    case 'solar': {
      document.getElementById('f-gravity').checked = true;
      document.getElementById('sl-G').value = 300; document.getElementById('v-G').textContent = '300';
      document.getElementById('sl-damp').value = 1000; document.getElementById('v-damp').textContent = '1.000';
      document.getElementById('sel-boundary').value = 'none';
      document.getElementById('sl-trail').value = 200; document.getElementById('v-trail').textContent = '200';
      // Central star
      particles.push(makeParticle(cx, cy, 0, 0, 500, 0));
      // Orbiting planets
      for (let i = 0; i < 150; i++) {
        const r = 60 + Math.random() * 350;
        const a = Math.random() * TAU;
        const speed = Math.sqrt(300 * 0.01 * 500 / r) * (0.8 + Math.random() * 0.4);
        particles.push(makeParticle(
          cx + Math.cos(a) * r, cy + Math.sin(a) * r,
          -Math.sin(a) * speed, Math.cos(a) * speed,
          0.5 + Math.random() * 2, 0
        ));
      }
      break;
    }
    case 'galaxy': {
      document.getElementById('f-gravity').checked = true;
      document.getElementById('sl-G').value = 200; document.getElementById('v-G').textContent = '200';
      document.getElementById('sl-damp').value = 1000; document.getElementById('v-damp').textContent = '1.000';
      document.getElementById('sel-boundary').value = 'none';
      document.getElementById('sl-trail').value = 100; document.getElementById('v-trail').textContent = '100';
      document.getElementById('sl-count').value = 500; document.getElementById('v-count').textContent = '500';
      // Core
      particles.push(makeParticle(cx, cy, 0, 0, 1000, 0));
      for (let i = 0; i < 500; i++) {
        const r = 20 + Math.pow(Math.random(), 0.5) * 400;
        const a = Math.random() * TAU;
        const speed = Math.sqrt(200 * 0.01 * 1000 / r) * (0.9 + Math.random() * 0.2);
        // Add slight thickness
        const px = cx + Math.cos(a) * r + (Math.random() - 0.5) * 10;
        const py = cy + Math.sin(a) * r + (Math.random() - 0.5) * 10;
        particles.push(makeParticle(px, py,
          -Math.sin(a) * speed + (Math.random()-0.5)*0.2,
          Math.cos(a) * speed + (Math.random()-0.5)*0.2,
          0.3 + Math.random(), 0
        ));
      }
      break;
    }
    case 'molecular': {
      document.getElementById('f-lj').checked = true;
      document.getElementById('sl-lj').value = 80; document.getElementById('v-lj').textContent = '80';
      document.getElementById('sl-damp').value = 998; document.getElementById('v-damp').textContent = '0.998';
      document.getElementById('sel-boundary').value = 'bounce';
      document.getElementById('sl-trail').value = 20; document.getElementById('v-trail').textContent = '20';
      document.getElementById('sl-count').value = 200; document.getElementById('v-count').textContent = '200';
      // Grid of particles with slight randomization
      const cols = 15, rows = 14;
      const spacing = 18;
      const ox = cx - (cols * spacing) / 2, oy = cy - (rows * spacing) / 2;
      for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
          particles.push(makeParticle(
            ox + i * spacing + (Math.random() - 0.5) * 4,
            oy + j * spacing + (Math.random() - 0.5) * 4,
            (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2,
            1, 0
          ));
        }
      }
      break;
    }
    case 'phi': {
      document.getElementById('f-phi').checked = true;
      document.getElementById('f-gravity').checked = true;
      document.getElementById('sl-G').value = 50; document.getElementById('v-G').textContent = '50';
      document.getElementById('sl-phi').value = 300; document.getElementById('v-phi').textContent = '300';
      document.getElementById('sl-damp').value = 999; document.getElementById('v-damp').textContent = '0.999';
      document.getElementById('sel-boundary').value = 'none';
      document.getElementById('sl-trail').value = 300; document.getElementById('v-trail').textContent = '300';
      document.getElementById('sl-count').value = 300; document.getElementById('v-count').textContent = '300';
      document.getElementById('sel-color').value = 'age';
      // Spawn in golden spiral
      const goldenAngle = TAU / (PHI * PHI);
      for (let i = 0; i < 300; i++) {
        const r = 5 + Math.sqrt(i) * 12;
        const a = i * goldenAngle;
        const speed = 0.5 + r * 0.003;
        particles.push(makeParticle(
          cx + Math.cos(a) * r, cy + Math.sin(a) * r,
          -Math.sin(a) * speed + (Math.random()-0.5)*0.3,
          Math.cos(a) * speed + (Math.random()-0.5)*0.3,
          1 + Math.random(), (Math.random() - 0.5) * 0.5
        ));
      }
      break;
    }
    case 'pendulum': {
      document.getElementById('f-spring').checked = true;
      document.getElementById('f-gravity').checked = true;
      document.getElementById('sl-G').value = 0; document.getElementById('v-G').textContent = '0';
      document.getElementById('sl-ks').value = 180; document.getElementById('v-ks').textContent = '180';
      document.getElementById('sl-damp').value = 1000; document.getElementById('v-damp').textContent = '1.000';
      document.getElementById('sel-boundary').value = 'none';
      document.getElementById('sl-trail').value = 500; document.getElementById('v-trail').textContent = '500';
      document.getElementById('sl-count').value = 50; document.getElementById('v-count').textContent = '50';
      // Multiple double pendulums with slightly different initial conditions
      const numPendulums = 25;
      const armLen = 80;
      for (let p = 0; p < numPendulums; p++) {
        const angle1 = Math.PI * 0.7 + (Math.random() - 0.5) * 0.02;
        const angle2 = Math.PI * 0.7 + (Math.random() - 0.5) * 0.02;
        const anchorX = cx, anchorY = cy - 100;
        // Anchor (heavy, stationary)
        const ai = particles.length;
        particles.push(makeParticle(anchorX, anchorY, 0, 0, 10000, 0));
        // Bob 1
        const b1x = anchorX + Math.sin(angle1) * armLen;
        const b1y = anchorY + Math.cos(angle1) * armLen;
        particles.push(makeParticle(b1x, b1y, 0, 0, 5, 0));
        // Bob 2
        const b2x = b1x + Math.sin(angle2) * armLen;
        const b2y = b1y + Math.cos(angle2) * armLen;
        particles.push(makeParticle(b2x, b2y, 0, 0, 5, 0));
        // Springs (rigid-ish)
        springs.push({ a: ai, b: ai + 1, rest: armLen });
        springs.push({ a: ai + 1, b: ai + 2, rest: armLen });
      }
      // Add downward gravity manually via a hack: we use the gravity force but add a constant downward field
      // Actually, let's add a uniform gravity field in the force computation
      break;
    }
    case 'threebody': {
      document.getElementById('f-gravity').checked = true;
      document.getElementById('sl-G').value = 400; document.getElementById('v-G').textContent = '400';
      document.getElementById('sl-damp').value = 1000; document.getElementById('v-damp').textContent = '1.000';
      document.getElementById('sel-boundary').value = 'none';
      document.getElementById('sl-trail').value = 500; document.getElementById('v-trail').textContent = '500';
      document.getElementById('sl-count').value = 3; document.getElementById('v-count').textContent = '3';
      document.getElementById('sl-soft').value = 5; document.getElementById('v-soft').textContent = '5';
      // Figure-8 three-body solution (approximate)
      const v = 1.5;
      const d = 100;
      particles.push(makeParticle(cx - d, cy, 0.347 * v, 0.533 * v, 30, 0));
      particles.push(makeParticle(cx + d, cy, 0.347 * v, 0.533 * v, 30, 0));
      particles.push(makeParticle(cx, cy, -0.694 * v, -1.066 * v, 30, 0));
      break;
    }
  }

  paused = false;
  document.getElementById('btn-play').textContent = 'Pause';
}

// ========== UNIFORM GRAVITY FOR PENDULUM ==========
// We modify computeForces to include a uniform gravity field when spring forces are on
const origComputeForces = computeForces;
computeForces = function(cfg) {
  origComputeForces(cfg);
  // Uniform gravity for pendulum-like setups
  if (cfg.spring && cfg.ks > 0) {
    for (const p of particles) {
      p.ay += 0.3; // downward gravity
    }
  }
};

// ========== INTERACTION ==========
function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / camera.zoom + camera.x,
    y: (sy - H / 2) / camera.zoom + camera.y,
  };
}

mainCanvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    const rect = mainCanvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    dragStart = screenToWorld(sx, sy);
    dragCurrent = { ...dragStart };
    isDragging = true;
  }
});

mainCanvas.addEventListener('mousemove', e => {
  if (isDragging) {
    const rect = mainCanvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    dragCurrent = screenToWorld(sx, sy);
  }
});

mainCanvas.addEventListener('mouseup', e => {
  if (e.button === 0 && isDragging) {
    isDragging = false;
    const dx = dragCurrent.x - dragStart.x;
    const dy = dragCurrent.y - dragStart.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 3) {
      // Click: add particle at rest
      particles.push(makeParticle(dragStart.x, dragStart.y, 0, 0, 2, (Math.random() - 0.5) * 2));
    } else {
      // Drag: launch with velocity
      const vScale = 0.05;
      particles.push(makeParticle(dragStart.x, dragStart.y, dx * vScale, dy * vScale, 2, (Math.random() - 0.5) * 2));
    }
    dragStart = null; dragCurrent = null;
  }
});

mainCanvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const rect = mainCanvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);
  particles.push(makeParticle(w.x, w.y, 0, 0, 100, 0));
});

mainCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  camera.zoom *= factor;
  camera.zoom = Math.max(0.1, Math.min(20, camera.zoom));
}, { passive: false });

// ========== PLAYBACK CONTROLS ==========
function togglePause() {
  paused = !paused;
  document.getElementById('btn-play').textContent = paused ? 'Play' : 'Pause';
}

function stepOnce() {
  paused = true;
  document.getElementById('btn-play').textContent = 'Play';
  const cfg = readConfig();
  integrate(cfg);
  frameCount++;
  render(cfg);
}

function resetSim() {
  particles = [];
  springs = [];
  energyHistory = [];
  frameCount = 0;
  camera = { x: W/2, y: H/2, zoom: 1 };
}

// ========== EXPORT ==========
function exportJSON() {
  const state = {
    particles: particles.map(p => ({
      x: p.x, y: p.y, vx: p.vx, vy: p.vy, mass: p.mass, charge: p.charge
    })),
    springs: springs,
    camera: camera,
    frame: frameCount
  };
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'particle_state.json';
  a.click();
}

function exportPNG() {
  const a = document.createElement('a');
  a.href = mainCanvas.toDataURL('image/png');
  a.download = 'particle_sim.png';
  a.click();
}

// ========== MAIN LOOP ==========
function loop() {
  const cfg = readConfig();
  if (!paused) {
    // Sub-steps for stability
    const subSteps = particles.length <= 50 ? 4 : 2;
    const subCfg = { ...cfg, dt: cfg.dt / subSteps };
    for (let s = 0; s < subSteps; s++) {
      integrate(subCfg);
    }
    frameCount++;
  }
  render(cfg);
  requestAnimationFrame(loop);
}

// ========== INIT ==========
camera = { x: W / 2, y: H / 2, zoom: 1 };
loadPreset('solar');
loop();
</script>
